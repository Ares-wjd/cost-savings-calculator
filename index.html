<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IT기기 적립금 계산기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  :root {
    --bg-primary: #ffffff;
    --bg-secondary: #f7f6f3;
    --bg-info: #e6f1fb;
    --text-primary: #18181a;
    --text-secondary: #5f5e5a;
    --text-tertiary: #888780;
    --text-info: #0c447c;
    --border-tertiary: rgba(0,0,0,0.1);
    --border-secondary: rgba(0,0,0,0.18);
    --radius-md: 8px;
    --radius-lg: 12px;
    --green: #1a7f37;
    --red: #c0392b;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg-primary: #1e1e1e;
      --bg-secondary: #2a2a2a;
      --bg-info: #0c447c;
      --text-primary: #f2f2f0;
      --text-secondary: #b4b2a9;
      --text-tertiary: #888780;
      --text-info: #b5d4f4;
      --border-tertiary: rgba(255,255,255,0.12);
      --border-secondary: rgba(255,255,255,0.2);
    }
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, "Pretendard", "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg-secondary);
    color: var(--text-primary);
    margin: 0;
    padding: 24px 16px 64px;
    line-height: 1.6;
  }
  .wrap {
    max-width: 760px;
    margin: 0 auto;
    background: var(--bg-primary);
    border-radius: var(--radius-lg);
    border: 0.5px solid var(--border-tertiary);
    padding: 1.5rem 1.5rem 2rem;
  }
  h1 {
    font-size: 20px;
    font-weight: 500;
    margin: 0 0 1rem;
  }
  input, button {
    font-family: inherit;
    font-size: 14px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-secondary);
    background: var(--bg-primary);
    color: var(--text-primary);
    padding: 8px 10px;
    height: 36px;
  }
  input:focus, button:focus {
    outline: none;
    box-shadow: 0 0 0 2px var(--bg-info);
  }
  button { cursor: pointer; background: var(--bg-primary); }
  button:hover { background: var(--bg-secondary); }
  button:active { transform: scale(0.98); }
  button:disabled { opacity: 0.5; cursor: not-allowed; }

  .sync-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 12px;
    border-radius: var(--radius-md);
    background: var(--bg-secondary);
    margin-bottom: 1.25rem;
    font-size: 13px;
    flex-wrap: wrap;
  }
  .sync-status { display: flex; align-items: center; gap: 6px; color: var(--text-secondary); }
  .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text-tertiary); flex-shrink: 0; }
  .dot.synced { background: var(--green); }
  .dot.error { background: var(--red); }
  .dot.syncing { background: #d9a300; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;} 50%{opacity:0.4;} }
  .sync-bar .right { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .sheet-link { font-size: 12px; color: var(--text-info); text-decoration: none; }
  .sheet-link:hover { text-decoration: underline; }

  .top-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 0 0 1.5rem;
    flex-wrap: wrap;
  }
  .top-row label { font-size: 14px; color: var(--text-secondary); white-space: nowrap; }
  #fund { width: 120px; }
  #addBtn { margin-left: auto; }
  #rows { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
  .row { display: flex; align-items: center; gap: 8px; }
  .row input[data-f="name"] { flex: 1.6; min-width: 0; }
  .row input[data-f="budget"], .row input[data-f="months"] { flex: 1; min-width: 0; }
  .unit { font-size: 12px; color: var(--text-tertiary); width: 34px; flex-shrink: 0; }
  .delBtn { width: 36px; padding: 0; flex-shrink: 0; }
  .stats {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 12px;
    margin-bottom: 1.5rem;
  }
  .stat-card { background: var(--bg-secondary); border-radius: var(--radius-md); padding: 1rem; }
  .stat-card.info { background: var(--bg-info); }
  .stat-label { font-size: 13px; color: var(--text-secondary); margin: 0 0 4px; }
  .stat-card.info .stat-label { color: var(--text-info); }
  .stat-value { font-size: 24px; font-weight: 500; margin: 0; }
  .stat-card.info .stat-value { color: var(--text-info); }
  table { width: 100%; border-collapse: collapse; font-size: 13px; table-layout: fixed; }
  th, td { padding: 6px 4px; }
  th { text-align: right; color: var(--text-secondary); font-weight: 500; border-bottom: 0.5px solid var(--border-tertiary); }
  th:first-child, td:first-child { text-align: left; }
  td { border-bottom: 0.5px solid var(--border-tertiary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .muted { color: var(--text-secondary); }
  .highlight { font-weight: 500; color: var(--text-info); }
  .note { font-size: 12px; color: var(--text-tertiary); margin: 1.5rem 0 0; }
</style>
</head>
<body>
<div class="wrap">
  <h1>IT기기 적립금 계산기</h1>

  <div class="sync-bar">
    <div class="sync-status">
      <span class="dot" id="syncDot"></span>
      <span id="syncText">Google 계정 연결 안 됨 (이 브라우저에만 저장 중)</span>
    </div>
    <div class="right">
      <a href="#" id="sheetLink" class="sheet-link" target="_blank" rel="noopener" style="display:none;">시트 열기 ↗</a>
      <button id="authBtn">Google 계정으로 연결</button>
    </div>
  </div>

  <div class="top-row">
    <label for="fund">현재 적립금(만원)</label>
    <input type="number" id="fund" value="100" min="0" step="1" />
    <button id="addBtn"><i class="ti ti-plus" aria-hidden="true" style="font-size:16px; vertical-align:-2px; margin-right:4px;"></i>기기 추가</button>
  </div>

  <div id="rows"></div>

  <div class="stats">
    <div class="stat-card">
      <p class="stat-label">전체 예산 총액</p>
      <p class="stat-value" id="totalBudget">0만원</p>
    </div>
    <div class="stat-card">
      <p class="stat-label">적립금 적용 후 부족분</p>
      <p class="stat-value" id="totalShort">0만원</p>
    </div>
    <div class="stat-card info">
      <p class="stat-label">월 저축액 합계</p>
      <p class="stat-value" id="totalMonthly">0만원</p>
    </div>
  </div>

  <table>
    <colgroup>
      <col style="width:26%"><col style="width:14%"><col style="width:14%"><col style="width:16%"><col style="width:15%"><col style="width:15%">
    </colgroup>
    <thead>
      <tr>
        <th>기기</th><th>예산</th><th>남은개월</th><th>적립금 배정</th><th>부족분</th><th>월 저축액</th>
      </tr>
    </thead>
    <tbody id="resultBody"></tbody>
  </table>

  <p class="note">만기(남은 개월)가 빠른 기기부터 적립금을 우선 배정합니다. Google 계정 연결 시 자동으로 내 드라이브의 전용 시트에 저장되어 어느 기기에서든 같은 데이터를 볼 수 있습니다. 연결하지 않으면 이 브라우저에만 저장됩니다.</p>
</div>

<script>
/* ===== 설정 ===== */
const CLIENT_ID = '985691104006-k6lu0gfi5osnj3b4b6a3og3akruk9h8q.apps.googleusercontent.com';
const SCOPES = 'https://www.googleapis.com/auth/drive.file';
const SHEET_NAME = '[IT기기 적립금 계산기 전용] 데이터';
const LOCAL_KEY = 'it-savings-calculator-v1';
const SHEET_ID_KEY = 'it-savings-calculator-sheet-id';

const defaultDevices = [
  { name: "휴대폰", budget: 240, months: 24 },
  { name: "갤럭시 북 울트라", budget: 350, months: 33 },
  { name: "맥북 에어", budget: 180, months: 16 },
  { name: "무선이어폰(버즈)", budget: 25, months: 17 },
  { name: "갤럭시 워치", budget: 45, months: 22 },
  { name: "갤럭시 탭", budget: 90, months: 14 }
];

let devices = [];
let accessToken = null;
let sheetId = localStorage.getItem(SHEET_ID_KEY) || null;
let tokenClient = null;
let saveTimer = null;
let isApplyingRemote = false;

const rowsEl = document.getElementById('rows');
const fundEl = document.getElementById('fund');
const addBtn = document.getElementById('addBtn');
const authBtn = document.getElementById('authBtn');
const syncDot = document.getElementById('syncDot');
const syncText = document.getElementById('syncText');
const sheetLink = document.getElementById('sheetLink');

/* ===== 로컬 저장 (백업/오프라인용) ===== */
function loadLocal() {
  try {
    const raw = localStorage.getItem(LOCAL_KEY);
    if (raw) {
      const parsed = JSON.parse(raw);
      if (parsed && Array.isArray(parsed.devices)) return parsed;
    }
  } catch (e) {}
  return { fund: 100, devices: defaultDevices };
}
function saveLocal() {
  try {
    localStorage.setItem(LOCAL_KEY, JSON.stringify({ fund: +fundEl.value || 0, devices }));
  } catch (e) {}
}

/* ===== 초기 로드 ===== */
const initial = loadLocal();
devices = initial.devices;
fundEl.value = initial.fund;

/* ===== 렌더링 ===== */
function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function renderRows() {
  rowsEl.innerHTML = '';
  devices.forEach((d, i) => {
    const row = document.createElement('div');
    row.className = 'row';
    row.innerHTML = `
      <input type="text" value="${escapeHtml(d.name)}" data-i="${i}" data-f="name" />
      <input type="number" value="${d.budget}" min="0" step="1" data-i="${i}" data-f="budget" />
      <span class="unit">만원</span>
      <input type="number" value="${d.months}" min="1" step="1" data-i="${i}" data-f="months" />
      <span class="unit">개월</span>
      <button class="delBtn" data-del="${i}" aria-label="기기 삭제"><i class="ti ti-trash" aria-hidden="true" style="font-size:16px;"></i></button>
    `;
    rowsEl.appendChild(row);
  });

  rowsEl.querySelectorAll('input').forEach(inp => {
    inp.addEventListener('input', e => {
      const i = +e.target.dataset.i;
      const f = e.target.dataset.f;
      devices[i][f] = f === 'name' ? e.target.value : (+e.target.value || 0);
      calculate();
      onDataChanged();
    });
  });
  rowsEl.querySelectorAll('button[data-del]').forEach(btn => {
    btn.addEventListener('click', e => {
      const i = +e.currentTarget.dataset.del;
      devices.splice(i, 1);
      renderRows();
      calculate();
      onDataChanged();
    });
  });
}

function calculate() {
  const fund = Math.max(0, +fundEl.value || 0);
  const sorted = devices.map((d, idx) => ({...d, idx})).sort((a, b) => a.months - b.months);

  let remaining = fund;
  const results = sorted.map(d => {
    const allocated = Math.min(remaining, d.budget);
    remaining = Math.round((remaining - allocated) * 10) / 10;
    const shortfall = Math.round((d.budget - allocated) * 10) / 10;
    const monthly = Math.round((shortfall / d.months) * 10) / 10;
    return { ...d, allocated: Math.round(allocated * 10) / 10, shortfall, monthly };
  });
  results.sort((a, b) => a.idx - b.idx);

  const totalBudget = Math.round(devices.reduce((s, d) => s + d.budget, 0) * 10) / 10;
  const totalShort = Math.round(results.reduce((s, r) => s + r.shortfall, 0) * 10) / 10;
  const totalMonthly = Math.round(results.reduce((s, r) => s + r.monthly, 0) * 10) / 10;

  document.getElementById('totalBudget').textContent = totalBudget.toLocaleString() + '만원';
  document.getElementById('totalShort').textContent = totalShort.toLocaleString() + '만원';
  document.getElementById('totalMonthly').textContent = totalMonthly.toLocaleString() + '만원';

  const body = document.getElementById('resultBody');
  body.innerHTML = '';
  results.forEach(r => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${escapeHtml(r.name)}</td>
      <td style="text-align:right;">${r.budget.toLocaleString()}</td>
      <td style="text-align:right;">${r.months}</td>
      <td style="text-align:right;" class="muted">${r.allocated.toLocaleString()}</td>
      <td style="text-align:right;">${r.shortfall.toLocaleString()}</td>
      <td style="text-align:right;" class="highlight">${r.monthly.toLocaleString()}</td>
    `;
    body.appendChild(tr);
  });
}

addBtn.addEventListener('click', () => {
  devices.push({ name: "새 기기", budget: 0, months: 12 });
  renderRows();
  calculate();
  onDataChanged();
});
fundEl.addEventListener('input', () => { calculate(); onDataChanged(); });

/* ===== 변경 발생 시: 로컬 저장 + (로그인 상태면) 디바운스 후 시트 저장 ===== */
function onDataChanged() {
  if (isApplyingRemote) return;
  saveLocal();
  if (accessToken) {
    setSyncStatus('syncing', '저장 중…');
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveToSheet, 800);
  }
}

function setSyncStatus(state, text) {
  syncDot.className = 'dot' + (state ? ' ' + state : '');
  syncText.textContent = text;
}

/* ===== Google 인증 ===== */
function initGoogle() {
  tokenClient = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID,
    scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) {
        setSyncStatus('error', '연결 실패: ' + resp.error);
        return;
      }
      accessToken = resp.access_token;
      authBtn.textContent = '연결됨';
      authBtn.disabled = true;
      setSyncStatus('syncing', '내 시트 확인 중…');
      await connectSheet();
    }
  });
  authBtn.disabled = false;
}

authBtn.addEventListener('click', () => {
  if (!tokenClient) return;
  tokenClient.requestAccessToken();
});

/* ===== 시트 연결: 기존 시트 있으면 불러오기, 없으면 새로 생성 ===== */
async function connectSheet() {
  try {
    if (sheetId) {
      const ok = await loadFromSheet(sheetId);
      if (ok) {
        setSyncStatus('synced', '동기화됨');
        showSheetLink();
        return;
      }
      // 저장된 ID가 더 이상 유효하지 않으면 새로 생성
      sheetId = null;
    }
    await createSheet();
    await saveToSheet();
    setSyncStatus('synced', '동기화됨 (새 시트 생성)');
    showSheetLink();
  } catch (err) {
    console.error(err);
    setSyncStatus('error', '연결 중 오류 발생 (이 브라우저 저장은 계속 유지됩니다)');
  }
}

function showSheetLink() {
  if (!sheetId) return;
  sheetLink.href = `https://docs.google.com/spreadsheets/d/${sheetId}/edit`;
  sheetLink.style.display = 'inline';
}

async function gfetch(url, options = {}) {
  const res = await fetch(url, {
    ...options,
    headers: {
      ...(options.headers || {}),
      Authorization: `Bearer ${accessToken}`
    }
  });
  if (!res.ok) {
    const text = await res.text();
    throw new Error(`API 오류 ${res.status}: ${text}`);
  }
  return res.json();
}

async function createSheet() {
  const data = await gfetch('https://sheets.googleapis.com/v4/spreadsheets', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      properties: { title: SHEET_NAME },
      sheets: [{ properties: { title: 'data' } }]
    })
  });
  sheetId = data.spreadsheetId;
  localStorage.setItem(SHEET_ID_KEY, sheetId);
  // 헤더 작성
  await gfetch(
    `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/data!A1:D1?valueInputOption=RAW`,
    {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ values: [['type', 'name', 'budget', 'months']] })
    }
  );
}

/* 시트 레이아웃:
   row1: 헤더
   row2: fund 행 -> type=fund, name=(미사용), budget=적립금값, months=(미사용)
   row3~: 기기 행 -> type=device, name, budget, months
*/
async function saveToSheet() {
  if (!accessToken || !sheetId) return;
  setSyncStatus('syncing', '저장 중…');
  const fund = +fundEl.value || 0;
  const rows = [
    ['type', 'name', 'budget', 'months'],
    ['fund', '', fund, ''],
    ...devices.map(d => ['device', d.name, d.budget, d.months])
  ];
  try {
    // 기존 내용 지우고 새로 씀 (행 개수가 줄어드는 경우 대비)
    await gfetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/data!A1:D1000:clear`,
      { method: 'POST' }
    );
    await gfetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values/data!A1?valueInputOption=RAW`,
      {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ values: rows })
      }
    );
    setSyncStatus('synced', '동기화됨');
  } catch (err) {
    console.error(err);
    setSyncStatus('error', '저장 실패 (이 브라우저에는 저장됨)');
  }
}

async function loadFromSheet(id) {
  try {
    const data = await gfetch(
      `https://sheets.googleapis.com/v4/spreadsheets/${id}/values/data!A1:D1000`
    );
    const rows = data.values || [];
    if (rows.length <= 1) return true; // 헤더만 있는 빈 시트도 유효

    isApplyingRemote = true;
    let fund = +fundEl.value || 0;
    const loadedDevices = [];
    for (let i = 1; i < rows.length; i++) {
      const [type, name, budget, months] = rows[i];
      if (type === 'fund') fund = +budget || 0;
      if (type === 'device') loadedDevices.push({ name: name || '', budget: +budget || 0, months: Math.max(1, +months || 1) });
    }
    fundEl.value = fund;
    devices = loadedDevices.length ? loadedDevices : devices;
    renderRows();
    calculate();
    saveLocal();
    isApplyingRemote = false;
    return true;
  } catch (err) {
    console.error(err);
    return false;
  }
}

/* ===== 초기 렌더 ===== */
renderRows();
calculate();

window.addEventListener('load', () => {
  if (window.google && google.accounts) {
    initGoogle();
  } else {
    // GIS 스크립트 로드 대기
    const check = setInterval(() => {
      if (window.google && google.accounts) {
        clearInterval(check);
        initGoogle();
      }
    }, 200);
  }
});
</script>
</body>
</html>
